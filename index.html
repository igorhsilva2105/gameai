<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Quest: Biome Omen – Multiplataforma</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f0f0f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            color: #eee;
            overflow-x: hidden;
            padding: 10px;
        }

        #game-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            margin-bottom: 10px;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
            background-color: #222;
            width: 100%;
            height: auto;
            max-width: 400px;
        }

        /* Estilos da UI dinâmica */
        .ui-top {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            font-weight: bold;
            font-size: 16px;
            z-index: 10;
        }

        #stats-left {
            white-space: nowrap;
        }

        #hearts {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 20px;
            line-height: 1;
        }

        #boost-indicator {
            margin-left: 8px;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        #dash-bar-container {
            position: absolute;
            top: 45px;
            right: 10px;
            width: 80px;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 4px;
            z-index: 5;
        }

        #dash-bar {
            width: 100%;
            height: 100%;
            background: #00d2ff;
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .virtual-pad {
            display: none;
            width: 100%;
            max-width: 600px;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 20px;
            touch-action: manipulation;
        }

        .dpad {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 140px;
            height: 140px;
            background: rgba(30,30,30,0.8);
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 8px 0 #111, 0 10px 20px rgba(0,0,0,0.5);
        }

        .dpad-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            border-radius: 12px;
            box-shadow: inset 0 -2px 0 #0a0a0a, 0 4px 0 #1a1a1a;
            color: #ffd966;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.05s;
        }

        .dpad-cell:active {
            transform: translateY(4px);
            box-shadow: inset 0 -1px 0 #0a0a0a, 0 2px 0 #1a1a1a;
        }

        .dpad-cell:empty {
            background: transparent;
            box-shadow: none;
            pointer-events: none;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(30,30,30,0.8);
            border-radius: 40px;
            padding: 20px 15px;
            box-shadow: 0 8px 0 #111, 0 10px 20px rgba(0,0,0,0.5);
        }

        .action-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #222;
            box-shadow: 0 6px 0 #111, 0 8px 12px rgba(0,0,0,0.6);
            color: white;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            border: 2px solid #555;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.05s;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #111, 0 4px 8px rgba(0,0,0,0.6);
        }

        .action-btn.a { background: #2ecc71; }
        .action-btn.b { background: #e74c3c; }
        .action-btn.y { background: #f1c40f; color: #222; }
        .action-btn.start, .action-btn.select, .action-btn.pause { 
            width: 70px; 
            border-radius: 40px; 
            background: #555; 
            font-size: 18px;
            box-shadow: 0 4px 0 #222;
        }
        .action-btn.pause { background: #3498db; }

        @media (max-width: 800px) {
            body {
                justify-content: flex-start;
                padding: 5px;
            }
            .virtual-pad {
                display: flex;
            }
        }

        @media (max-width: 800px) and (orientation: portrait) {
            body {
                flex-direction: column;
            }
            .virtual-pad {
                flex-direction: row;
                justify-content: space-around;
                max-width: 100%;
            }
            .dpad {
                width: 130px;
                height: 130px;
            }
            .action-btn {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
            .action-btn.start, .action-btn.select, .action-btn.pause {
                width: 65px;
                font-size: 16px;
            }
        }

        @media (max-width: 800px) and (orientation: landscape) {
            body {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 5px;
            }
            #game-container {
                margin-bottom: 0;
            }
            .virtual-pad {
                flex-direction: row;
                margin-top: 0;
                width: auto;
                max-width: none;
            }
            .dpad {
                margin-right: 10px;
            }
            .action-buttons {
                margin-left: 10px;
            }
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <!-- A UI será inserida aqui via JavaScript -->
</div>
<!-- Scripts na ordem correta -->
<script src="state-system.js"></script>
<script src="core-data.js"></script>
<script src="input-type.js"></script>
<script src="procedural-music.js"></script>
<script src="gamepad-support.js"></script>
<script src="virtual-pad.js"></script>
<script src="helper-functions.js"></script>
<script src="audio-system.js"></script>
<script src="physics-collision.js"></script>
<script src="effects.js"></script>
<script src="enemy-factory.js"></script>
<script src="level-generation.js"></script>
<script src="drop-system.js"></script>
<script src="initialization-reset.js"></script>
<script src="transition-helpers.js"></script>
<script src="damage-handler.js"></script>
<script src="input-system.js"></script>
<script src="update-system.js"></script>
<script src="render-system.js"></script>
<script src="ui-manager.js"></script>
<script src="tutorial.js"></script>
<script src="initial-boot.js"></script>
</body>
</html>
