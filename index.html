<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Quest: Biome Omen – Multiplataforma</title>
    <style>
        * {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: #0f0f0f;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    color: #eee;
    overflow-x: hidden;
    padding: 10px;
}

#game-container {
    position: relative;
    border: 4px solid #333;
    box-shadow: 0 0 50px rgba(0,0,0,0.9);
    margin-bottom: 10px;
}

canvas {
    image-rendering: pixelated;
    display: block;
    background-color: #222;
    width: 100%;
    height: auto;
    max-width: 400px;
}

/* Estilos da UI dinâmica */
.ui-top {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    text-shadow: 2px 2px 0px #000;
    font-weight: bold;
    font-size: 16px;
    z-index: 10;
}

#stats-left {
    white-space: nowrap;
}

#hearts {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 20px;
    line-height: 1;
}

#boost-indicator {
    margin-left: 8px;
    font-size: 18px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

#dash-bar-container {
    position: absolute;
    top: 45px;
    right: 10px;
    width: 80px;
    height: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #444;
    border-radius: 4px;
    z-index: 5;
}

#dash-bar {
    width: 100%;
    height: 100%;
    background: #00d2ff;
    border-radius: 4px;
    transition: width 0.1s linear;
}
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <!-- A UI será inserida aqui via JavaScript -->
</div>
<!-- Scripts na ordem correta -->
<script src="state-system.js"></script>
<script src="core-data.js"></script>
<script src="input-type.js"></script>
<script src="procedural-music.js"></script>
<script src="gamepad-support.js"></script>
<script src="input-system.js"></script>
<script src="virtual-pad.js"></script>
<script src="helper-functions.js"></script>
<script src="audio-system.js"></script>
<script src="physics-collision.js"></script>
<script src="effects.js"></script>
<script src="enemy-factory.js"></script>
<script src="level-generation.js"></script>
<script src="drop-system.js"></script>
<script src="initialization-reset.js"></script>
<script src="transition-helpers.js"></script>
<script src="damage-handler.js"></script>
<script src="update-system.js"></script>
<script src="render-system.js"></script>
<script src="ui-manager.js"></script>
<script src="tutorial.js"></script>
<script src="initial-boot.js"></script>
</body>
</html>
